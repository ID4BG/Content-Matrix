openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Content Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: campaigns
    description: Content campaign operations
  - name: content-pieces
    description: Content piece operations
  - name: comments
    description: Comment operations
  - name: dashboard
    description: Dashboard summary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List all campaigns
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a new campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Not found
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /campaigns/{id}/approve:
    post:
      operationId: approveCampaign
      tags: [campaigns]
      summary: Approve a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /content-pieces:
    get:
      operationId: listContentPieces
      tags: [content-pieces]
      summary: List content pieces
      parameters:
        - name: campaignId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of content pieces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentPiece"
    post:
      operationId: createContentPiece
      tags: [content-pieces]
      summary: Create a content piece
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentPieceBody"
      responses:
        "201":
          description: Created content piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPiece"

  /content-pieces/{id}:
    get:
      operationId: getContentPiece
      tags: [content-pieces]
      summary: Get a content piece by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Content piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPiece"
        "404":
          description: Not found
    patch:
      operationId: updateContentPiece
      tags: [content-pieces]
      summary: Update a content piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContentPieceBody"
      responses:
        "200":
          description: Updated content piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPiece"
    delete:
      operationId: deleteContentPiece
      tags: [content-pieces]
      summary: Delete a content piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /content-pieces/{id}/approve:
    post:
      operationId: approveContentPiece
      tags: [content-pieces]
      summary: Approve a content piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved content piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPiece"

  /comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments for a content piece
      parameters:
        - name: contentPieceId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Create a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Campaign:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, in_review, approved, published]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        contentPieceCount:
          type: integer
        approvedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - title
        - status
        - createdAt
        - updatedAt
        - contentPieceCount

    CreateCampaignBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
      required:
        - title

    UpdateCampaignBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, in_review, approved, published]

    ContentPiece:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        channel:
          type: string
          enum: [instagram_reel, linkedin_post, youtube_long, youtube_short, facebook_carousel, facebook_group_post, reddit_post, threads_post, source_article]
        title:
          type: string
        bodyText:
          type: string
          nullable: true
        mediaUrl:
          type: string
          nullable: true
        mediaType:
          type: string
          enum: [image, video, carousel, text, article]
          nullable: true
        status:
          type: string
          enum: [empty, uploaded, in_review, approved, needs_revision]
        commentCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        approvedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - campaignId
        - channel
        - title
        - status
        - commentCount
        - createdAt
        - updatedAt

    CreateContentPieceBody:
      type: object
      properties:
        campaignId:
          type: integer
        channel:
          type: string
          enum: [instagram_reel, linkedin_post, youtube_long, youtube_short, facebook_carousel, facebook_group_post, reddit_post, threads_post, source_article]
        title:
          type: string
        bodyText:
          type: string
          nullable: true
        mediaUrl:
          type: string
          nullable: true
        mediaType:
          type: string
          enum: [image, video, carousel, text, article]
          nullable: true
      required:
        - campaignId
        - channel
        - title

    UpdateContentPieceBody:
      type: object
      properties:
        title:
          type: string
        bodyText:
          type: string
          nullable: true
        mediaUrl:
          type: string
          nullable: true
        mediaType:
          type: string
          enum: [image, video, carousel, text, article]
          nullable: true
        status:
          type: string
          enum: [empty, uploaded, in_review, approved, needs_revision]

    Comment:
      type: object
      properties:
        id:
          type: integer
        contentPieceId:
          type: integer
        authorName:
          type: string
        text:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contentPieceId
        - authorName
        - text
        - createdAt

    CreateCommentBody:
      type: object
      properties:
        contentPieceId:
          type: integer
        authorName:
          type: string
        text:
          type: string
      required:
        - contentPieceId
        - authorName
        - text

    DashboardSummary:
      type: object
      properties:
        totalCampaigns:
          type: integer
        totalContentPieces:
          type: integer
        approvedPieces:
          type: integer
        pendingReview:
          type: integer
        needsRevision:
          type: integer
        campaignsByStatus:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalCampaigns
        - totalContentPieces
        - approvedPieces
        - pendingReview
        - needsRevision
        - campaignsByStatus

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [campaign_created, piece_uploaded, piece_approved, comment_added, campaign_approved]
        description:
          type: string
        entityId:
          type: integer
        entityTitle:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - description
        - entityId
        - entityTitle
        - createdAt
