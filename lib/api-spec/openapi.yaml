openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Content Matrix API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: campaigns
  - name: content-pieces
  - name: comments
  - name: dashboard
  - name: folders
  - name: sharing
  - name: invites
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns for the authenticated user
      parameters:
        - name: folderId
          in: query
          required: false
          schema:
            type: integer
            nullable: true
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a new campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Not found
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /campaigns/{id}/approve:
    post:
      operationId: approveCampaign
      tags: [campaigns]
      summary: Approve a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}/disapprove:
    post:
      operationId: disapproveCampaign
      tags: [campaigns]
      summary: Disapprove (un-approve) a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disapproved campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}/channels:
    patch:
      operationId: updateCampaignChannels
      tags: [campaigns]
      summary: Update which channels are included in a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignChannelsBody"
      responses:
        "200":
          description: Updated campaign channels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}/members:
    get:
      operationId: listCampaignMembers
      tags: [campaigns]
      summary: List members of a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of campaign members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignMember"
    post:
      operationId: inviteCampaignMember
      tags: [campaigns]
      summary: Invite a member to a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteCampaignMemberBody"
      responses:
        "201":
          description: Invited member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignMember"

  /campaigns/{id}/members/{memberId}:
    patch:
      operationId: updateCampaignMember
      tags: [campaigns]
      summary: Update a campaign member's role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignMemberBody"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignMember"
    delete:
      operationId: deleteCampaignMember
      tags: [campaigns]
      summary: Remove a member from a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /content-pieces:
    get:
      operationId: listContentPieces
      tags: [content-pieces]
      summary: List content pieces
      parameters:
        - name: campaignId
          in: query
          required: false
          schema:
            type: integer
        - name: channel
          in: query
          required: false
          schema:
            type: string
            enum: [instagram_reel, tiktok_post, x_post, linkedin_post, youtube_long, youtube_short, facebook_carousel, facebook_group_post, reddit_post, threads_post, source_article]
      responses:
        "200":
          description: List of content pieces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentPiece"
    post:
      operationId: createContentPiece
      tags: [content-pieces]
      summary: Create a content piece
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentPieceBody"
      responses:
        "201":
          description: Created content piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPiece"

  /content-pieces/{id}:
    get:
      operationId: getContentPiece
      tags: [content-pieces]
      summary: Get a content piece by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Content piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPiece"
        "404":
          description: Not found
    patch:
      operationId: updateContentPiece
      tags: [content-pieces]
      summary: Update a content piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContentPieceBody"
      responses:
        "200":
          description: Updated content piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPiece"
    delete:
      operationId: deleteContentPiece
      tags: [content-pieces]
      summary: Delete a content piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /content-pieces/{id}/approve:
    post:
      operationId: approveContentPiece
      tags: [content-pieces]
      summary: Approve a content piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved content piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPiece"

  /content-pieces/{id}/disapprove:
    post:
      operationId: disapproveContentPiece
      tags: [content-pieces]
      summary: Disapprove (revert approval of) a content piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disapproved content piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPiece"

  /content-pieces/{id}/submit-review:
    post:
      operationId: submitContentPieceForReview
      tags: [content-pieces]
      summary: Submit a content piece for review and notify a reviewer by email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitForReviewBody"
      responses:
        "200":
          description: Updated content piece now in review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPiece"

  /comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments for a content piece
      parameters:
        - name: contentPieceId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Create a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /folders:
    get:
      operationId: listFolders
      tags: [folders]
      summary: List folders for the authenticated user
      responses:
        "200":
          description: List of folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Folder"
    post:
      operationId: createFolder
      tags: [folders]
      summary: Create a folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderBody"
      responses:
        "201":
          description: Created folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"

  /folders/{id}:
    patch:
      operationId: updateFolder
      tags: [folders]
      summary: Update a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderBody"
      responses:
        "200":
          description: Updated folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
    delete:
      operationId: deleteFolder
      tags: [folders]
      summary: Delete a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /folders/{id}/share:
    post:
      operationId: shareFolderLink
      tags: [folders]
      summary: Generate a share link for a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Folder with share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"

  /campaigns/{id}/share:
    post:
      operationId: shareCampaignLink
      tags: [campaigns]
      summary: Generate a public share link for a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign with share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /shared/campaign/{token}:
    get:
      operationId: getSharedCampaign
      tags: [sharing]
      summary: Get a shared campaign and its approved pieces by token (public)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared campaign with approved content pieces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedCampaignView"
        "404":
          description: Not found or token invalid

  /shared/folder/{token}:
    get:
      operationId: getSharedFolder
      tags: [sharing]
      summary: Get a shared folder and its campaigns by token (public)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared folder with campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedFolderView"
        "404":
          description: Not found or token invalid

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats for authenticated user
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed for authenticated user
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /invites/accept-pending:
    post:
      operationId: acceptPendingInvites
      tags: [invites]
      summary: Accept all pending campaign invites for the authenticated user
      responses:
        "200":
          description: List of campaigns the user was just accepted into
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcceptedInvite"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Campaign:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, in_review, approved, published]
        folderId:
          type: integer
          nullable: true
        channels:
          type: array
          items:
            type: string
            enum: [instagram_reel, tiktok_post, x_post, linkedin_post, youtube_long, youtube_short, facebook_carousel, facebook_group_post, reddit_post, threads_post, source_article]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        contentPieceCount:
          type: integer
        approvedAt:
          type: string
          format: date-time
          nullable: true
        shareToken:
          type: string
          nullable: true
      required: [id, userId, title, status, channels, createdAt, updatedAt, contentPieceCount]

    CreateCampaignBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        folderId:
          type: integer
          nullable: true
        channels:
          type: array
          items:
            type: string
            enum: [instagram_reel, tiktok_post, x_post, linkedin_post, youtube_long, youtube_short, facebook_carousel, facebook_group_post, reddit_post, threads_post, source_article]
      required: [title]

    UpdateCampaignBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, in_review, approved, published]
        folderId:
          type: integer
          nullable: true

    UpdateCampaignChannelsBody:
      type: object
      properties:
        channels:
          type: array
          items:
            type: string
            enum: [instagram_reel, tiktok_post, x_post, linkedin_post, youtube_long, youtube_short, facebook_carousel, facebook_group_post, reddit_post, threads_post, source_article]
      required: [channels]

    CampaignMember:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [owner, marketer, team_member]
        permissions:
          type: array
          items:
            type: string
        accepted:
          type: boolean
        invitedAt:
          type: string
          format: date-time
      required: [id, campaignId, email, firstName, lastName, role, permissions, accepted, invitedAt]

    InviteCampaignMemberBody:
      type: object
      properties:
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [owner, marketer, team_member]
        permissions:
          type: array
          items:
            type: string
      required: [email, firstName, lastName, role]

    UpdateCampaignMemberBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [owner, marketer, team_member]
        permissions:
          type: array
          items:
            type: string

    SubmitForReviewBody:
      type: object
      properties:
        reviewerMemberId:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true

    ContentPiece:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        channel:
          type: string
          enum: [instagram_reel, tiktok_post, x_post, linkedin_post, youtube_long, youtube_short, facebook_carousel, facebook_group_post, reddit_post, threads_post, source_article]
        title:
          type: string
        bodyText:
          type: string
          nullable: true
        mediaUrl:
          type: string
          nullable: true
        mediaType:
          type: string
          enum: [image, video, carousel, text, article, document]
          nullable: true
        scheduledDate:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [empty, uploaded, in_review, approved, needs_revision]
        commentCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        approvedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, campaignId, channel, title, status, commentCount, createdAt, updatedAt]

    CreateContentPieceBody:
      type: object
      properties:
        campaignId:
          type: integer
        channel:
          type: string
          enum: [instagram_reel, tiktok_post, x_post, linkedin_post, youtube_long, youtube_short, facebook_carousel, facebook_group_post, reddit_post, threads_post, source_article]
        title:
          type: string
        bodyText:
          type: string
          nullable: true
        mediaUrl:
          type: string
          nullable: true
        mediaType:
          type: string
          enum: [image, video, carousel, text, article, document]
          nullable: true
        scheduledDate:
          type: string
          format: date-time
          nullable: true
      required: [campaignId, channel, title]

    UpdateContentPieceBody:
      type: object
      properties:
        title:
          type: string
        bodyText:
          type: string
          nullable: true
        mediaUrl:
          type: string
          nullable: true
        mediaType:
          type: string
          enum: [image, video, carousel, text, article, document]
          nullable: true
        scheduledDate:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [empty, uploaded, in_review, approved, needs_revision]

    Comment:
      type: object
      properties:
        id:
          type: integer
        contentPieceId:
          type: integer
        authorName:
          type: string
        text:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, contentPieceId, authorName, text, createdAt]

    CreateCommentBody:
      type: object
      properties:
        contentPieceId:
          type: integer
        authorName:
          type: string
        text:
          type: string
      required: [contentPieceId, authorName, text]

    Folder:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        parentFolderName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        shareToken:
          type: string
          nullable: true
        campaignCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, title, campaignCount, createdAt, updatedAt]

    CreateFolderBody:
      type: object
      properties:
        title:
          type: string
        parentFolderName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      required: [title]

    UpdateFolderBody:
      type: object
      properties:
        title:
          type: string
        parentFolderName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    SharedCampaignView:
      type: object
      properties:
        campaign:
          $ref: "#/components/schemas/Campaign"
        pieces:
          type: array
          items:
            $ref: "#/components/schemas/ContentPiece"
      required: [campaign, pieces]

    SharedFolderView:
      type: object
      properties:
        folder:
          $ref: "#/components/schemas/Folder"
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/Campaign"
      required: [folder, campaigns]

    DashboardSummary:
      type: object
      properties:
        totalCampaigns:
          type: integer
        totalContentPieces:
          type: integer
        approvedPieces:
          type: integer
        pendingReview:
          type: integer
        needsRevision:
          type: integer
        totalFolders:
          type: integer
        campaignsByStatus:
          type: object
          additionalProperties:
            type: integer
      required: [totalCampaigns, totalContentPieces, approvedPieces, pendingReview, needsRevision, totalFolders, campaignsByStatus]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [campaign_created, piece_uploaded, piece_approved, piece_submitted_for_review, comment_added, campaign_approved, folder_created]
        description:
          type: string
        entityId:
          type: integer
        entityTitle:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, type, description, entityId, entityTitle, createdAt]

    AcceptedInvite:
      type: object
      properties:
        campaignId:
          type: integer
        campaignTitle:
          type: string
        role:
          type: string
          enum: [owner, marketer, team_member]
      required: [campaignId, campaignTitle, role]
